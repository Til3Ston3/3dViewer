<!DOCTYPE HTML>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sketchfab Viewer</title>

    <!-- Sketchfab Viewer API -->
    <script type="text/javascript" src="https://static.sketchfab.com/api/sketchfab-viewer-1.12.1.js"></script>

    <style>
        /* Make viewer centered and full screen */
        html, body {
            margin: 0;
            height: 100%;
            width: 100%;
            background: #000;
        }

        #api-frame {
            display: block;
            margin: 0 auto;
            width: 100vw;
            height: 100vh;
            border: none;
        }
    </style>
</head>

<body>

    <!-- Viewer iframe -->
    <iframe 
        id="api-frame"
        allow="autoplay; fullscreen; xr-spatial-tracking"
        allowfullscreen
        mozallowfullscreen="true"
        webkitallowfullscreen="true">
    </iframe>

    <script>
        // Read UID from URL: viewer.html?uid=XXXX
        const params = new URLSearchParams(window.location.search);
        const uid = params.get("uid");

        if (uid) {
            loadModel(uid);
        } else {
            console.log("No UID provided in URL.");
        }

        function loadModel(uid) {
            var iframe = document.getElementById('api-frame');
            var client = new Sketchfab(iframe);

            client.init(uid, {
                success: function(api) {
                    api.start();
                    api.addEventListener('viewerready', function() {
                        console.log("Loaded model:", uid);
                    });
                },
                error: function() {
                    console.log("Viewer error");
                }
            });
        }
    </script>

</body>
</html>
